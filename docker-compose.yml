services:
  postgres:
    image: postgres:16-alpine
    container_name: lankside_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lankside}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lankside_password}
      POSTGRES_DB: ${POSTGRES_DB:-lankside_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lankside_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: development
    container_name: lankside_backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lankside:lankside_password@postgres:5432/lankside_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MOU_PDF_DIR: ${MOU_PDF_DIR:-/app/uploads/mous}
      REPORT_OUTPUT_DIR: ${REPORT_OUTPUT_DIR:-/app/uploads/reports}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
      target: development
    container_name: lankside_worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lankside:lankside_password@postgres:5432/lankside_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MOU_PDF_DIR: ${MOU_PDF_DIR:-/app/uploads/mous}
      REPORT_OUTPUT_DIR: ${REPORT_OUTPUT_DIR:-/app/uploads/reports}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: lankside_frontend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/backend}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
